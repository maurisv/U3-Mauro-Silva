<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dale Forma</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="hero">

        <img src="assets/daleforma.png" alt="Dale Forma" class="logo">

        <!-- Amarillos -->
        <div class="shape circle c1"></div>
        <div class="shape circle c2"></div>
        <div class="shape circle c3"></div>

        <!-- Rojos -->

<img src="assets/triangulo.png" class="shape triangulo t1" alt="">
<img src="assets/triangulo.png" class="shape triangulo t2" alt="">
<img src="assets/triangulo.png" class="shape triangulo t3" alt="">

        <!-- Azules -->
        <div class="shape square s1"></div>
        <div class="shape square s2"></div>
        <div class="shape square s3"></div>

<img src="assets/rectangulo.png" class="shape rectangulo r1" alt="">
<img src="assets/rectangulo.png" class="shape rectangulo r2" alt="">
<img src="assets/rectangulo.png" class="shape rectangulo r3" alt="">

        <!-- Verdes -->

<img src="assets/barra.png" class="shape barra b2" alt="">
<img src="assets/barra.png" class="shape barra b3" alt="">

<img src="assets/curva.png" class="shape curva a1" alt="">
<img src="assets/curva.png" class="shape curva a2" alt="">
<img src="assets/curva.png" class="shape curva a3" alt="">

    </section>

    <section class="transformacion-scroll">

    <div class="sticky-gallery">

        <div class="panel active">
            <img src="assets/EXPLORACION2.png" alt="">
        </div>

        <div class="panel">
            <img src="assets/CONSTRUCCIÓN.png" alt="">
        </div>

        <div class="panel">
            <img src="assets/CREAR.png" alt="">
        </div>

        <div class="panel">
            <img src="assets/TRANSFORMACION.png" alt="">
        </div>

    </div>

</section>

    <script src="script.js"></script>

</body>

</html>
